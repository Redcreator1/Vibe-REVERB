<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AetherSwarm Console — Démo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#070a12;color:#e8ecff;font-family:'IBM Plex Sans',system-ui,sans-serif}
@keyframes blink{0%,100%{opacity:.2}50%{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(129,140,248,.15)}50%{box-shadow:0 0 0 7px rgba(129,140,248,.04)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes typing{from{width:0}to{width:100%}}

/* LAYOUT */
.app{display:flex;flex-direction:column;height:100vh}

/* NAV */
.nav{display:flex;align-items:center;gap:12px;padding:10px 20px;border-bottom:1px solid rgba(148,163,184,.12);background:rgba(11,15,26,.85);backdrop-filter:blur(12px);position:sticky;top:0;z-index:30;}
.traffic{display:flex;gap:7px}
.dot{width:11px;height:11px;border-radius:50%}
.dot-r{background:#ff5f57}.dot-y{background:#febc2e}.dot-g{background:#28c840}
.addr{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:#7c89a8;flex:1;text-align:center}
.badge-live{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:#86efac;border:1px solid rgba(34,197,94,.3);background:rgba(34,197,94,.07);border-radius:999px;padding:4px 12px}
.pulse-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;box-shadow:0 0 9px #4ade80;animation:blink 1.6s infinite}
.lang-toggle{display:flex;gap:4px}
.lang-btn{background:none;border:1px solid rgba(148,163,184,.2);color:#94a3b8;border-radius:6px;padding:3px 10px;font-size:12px;cursor:pointer;transition:.2s}
.lang-btn.active{border-color:#6366f1;color:#c7d2fe;background:rgba(99,102,241,.15)}
.back-link{font-size:12px;color:#6366f1;text-decoration:none;padding:4px 10px;border:1px solid rgba(99,102,241,.3);border-radius:6px}
.back-link:hover{background:rgba(99,102,241,.1)}

/* MAIN GRID */
.main{flex:1;overflow:hidden;display:grid;grid-template-columns:270px 1fr;gap:0}

/* SIDEBAR */
.sidebar{border-right:1px solid rgba(148,163,184,.1);overflow-y:auto;padding:16px 12px;display:flex;flex-direction:column;gap:10px}
.sidebar-title{font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:#64748b;padding:0 4px 6px}
.mission-card{border:1px solid rgba(148,163,184,.12);border-radius:10px;padding:12px 14px;cursor:pointer;transition:.2s;background:rgba(255,255,255,.02)}
.mission-card:hover{border-color:rgba(99,102,241,.4);background:rgba(99,102,241,.07)}
.mission-card.active{border-color:#6366f1;background:rgba(99,102,241,.12)}
.mission-label{font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.mission-title{font-size:13px;font-weight:600;color:#e2e8f0;line-height:1.4}

/* CONSOLE AREA */
.console{display:flex;flex-direction:column;overflow:hidden}
.console-header{padding:16px 20px 12px;border-bottom:1px solid rgba(148,163,184,.08)}
.console-eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.16em;color:#93c5fd;margin-bottom:4px}
.console-title{font-size:1.5rem;font-weight:700;letter-spacing:-.02em}
.console-sub{font-size:13px;color:rgba(226,232,240,.6);margin-top:5px}

/* PIPELINE */
.pipeline-wrap{padding:16px 20px;border-bottom:1px solid rgba(148,163,184,.08)}
.pipeline{display:flex;align-items:center;gap:0;overflow-x:auto;padding-bottom:4px}
.agent-step{display:flex;flex-direction:column;align-items:center;gap:6px;min-width:80px}
.agent-icon{width:44px;height:44px;border-radius:12px;border:1.5px solid rgba(148,163,184,.2);background:rgba(255,255,255,.03);display:flex;align-items:center;justify-content:center;font-size:18px;transition:.3s;position:relative}
.agent-icon.active{border-color:#6366f1;background:rgba(99,102,241,.15);box-shadow:0 0 0 4px rgba(99,102,241,.12);animation:pulse 2s infinite}
.agent-icon.done{border-color:#22c55e;background:rgba(34,197,94,.1)}
.agent-icon.done::after{content:'✓';position:absolute;bottom:-4px;right:-4px;width:16px;height:16px;background:#22c55e;border-radius:50%;font-size:9px;display:flex;align-items:center;justify-content:center;color:#000;font-weight:700}
.agent-name{font-size:10px;color:#94a3b8;text-align:center;white-space:nowrap}
.agent-arrow{width:28px;height:2px;background:linear-gradient(90deg,rgba(99,102,241,.4),rgba(99,102,241,.15));flex-shrink:0;margin-top:-20px}

/* BRIEF INPUT */
.brief-area{padding:14px 20px;border-bottom:1px solid rgba(148,163,184,.08);display:flex;flex-direction:column;gap:10px}
.brief-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.12em;color:#c7d2fe}
.brief-input{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(148,163,184,.15);border-radius:10px;padding:12px 14px;color:#eef1ff;font-size:13.5px;font-family:'IBM Plex Sans',sans-serif;resize:none;outline:none;transition:.2s;line-height:1.5}
.brief-input:focus{border-color:#6366f1;background:rgba(99,102,241,.05)}
.run-btn{align-self:flex-end;background:linear-gradient(135deg,#6366f1,#4f46e5);border:none;color:#fff;padding:10px 22px;border-radius:9px;font-size:13.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;transition:.2s}
.run-btn:hover{opacity:.9;transform:translateY(-1px)}
.run-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;display:none}
.run-btn.running .spinner{display:block}
.run-btn.running .btn-label{display:none}
.run-btn.running .running-label{display:inline}
.running-label{display:none}

/* OUTPUT */
.output-area{flex:1;overflow-y:auto;padding:14px 20px}
.output-block{animation:fadeUp .3s ease}
.agent-output{margin-bottom:14px;border:1px solid rgba(148,163,184,.1);border-radius:10px;overflow:hidden}
.agent-output-header{padding:9px 14px;background:rgba(255,255,255,.03);border-bottom:1px solid rgba(148,163,184,.08);display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:#c7d2fe}
.agent-output-body{padding:12px 14px;font-size:13px;line-height:1.65;color:#cbd5e1;font-family:'IBM Plex Mono',monospace;white-space:pre-wrap}
.status-idle{color:#64748b;font-size:13px;text-align:center;padding:40px 20px}
.status-idle span{display:block;font-size:28px;margin-bottom:10px}
</style>
</head>
<body>
<div class="app">

<!-- NAV -->
<nav class="nav">
  <div class="traffic"><div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div></div>
  <div class="addr">127.0.0.1:8787 · aether-swarm</div>
  <div class="badge-live"><div class="pulse-dot"></div><span id="live-label">Connecté</span></div>
  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang('fr')">FR</button>
    <button class="lang-btn" onclick="setLang('en')">EN</button>
  </div>
  <a class="back-link" href="index.html">← Retour</a>
</nav>

<!-- MAIN -->
<div class="main">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-title" id="sb-title">Missions exemples</div>
    <div id="missions"></div>
  </aside>

  <!-- CONSOLE -->
  <div class="console">
    <div class="console-header">
      <div class="console-eyebrow" id="eyebrow">Console Interactive</div>
      <div class="console-title" id="ctitle">AetherSwarm v1</div>
      <div class="console-sub" id="csub">Pipeline 6 agents — 100% local, zéro SaaS</div>
    </div>

    <!-- PIPELINE -->
    <div class="pipeline-wrap">
      <div class="pipeline" id="pipeline"></div>
    </div>

    <!-- BRIEF -->
    <div class="brief-area">
      <div class="brief-label" id="brief-label">Mission</div>
      <textarea class="brief-input" id="brief" rows="3" placeholder="Décris ta mission..."></textarea>
      <button class="run-btn" id="run-btn" onclick="runSwarm()">
        <span class="spinner"></span>
        <span class="btn-label">▶ Lancer le Swarm</span>
        <span class="running-label">Agents en cours…</span>
      </button>
    </div>

    <!-- OUTPUT -->
    <div class="output-area" id="output">
      <div class="status-idle" id="idle-msg">
        <span>🤖</span>
        <span id="idle-text">Sélectionne une mission ou écris ton brief, puis lance le Swarm.</span>
      </div>
    </div>
  </div>
</div>
</div>

      ['🧠 Strategist', 'Analyse stratégique complète\n\nOpportunités détectées :\n\n① AGENTS LOCAUX (potentiel élevé)\n   Gap: outils locaux + abordables + simples\n   TAM estimé: 2.3M solopreneurs EU/NA\n   Prix cible: 29-49€ one-time\n\n② TEMPLATES IA SECTORIELS (potentiel moyen)\n   Gap: prompts génériques vs. use cases spécifiques\n   Modèle: pack à 9-19€ par vertical\n\n③ AUDIT IA AUTOMATISÉ (potentiel élevé)\n   Gap: auto-diagnostic sans consultant\n   Prix cible: 79-149€/rapport'],
      ['💻 Coder', 'Prototype MVP — Agent Local Solopreneur\n\n```python\nfrom langgraph.graph import StateGraph\nfrom langchain_community.llms import Ollama\n\nllm = Ollama(model="llama3.2:3b")\n\ndef research_agent(state):\n    """Collecte données marché"""\n    return {"data": llm.invoke(state["query"])}\n\ndef strategy_agent(state):\n    """Génère recommandations"""\n    prompt = f"Brief:{state[\'query\']}\\nData:{state[\'data\']}\\n→ Top 3 actions:"\n    return {"strategy": llm.invoke(prompt)}\n\ngraph = StateGraph(dict)\ngraph.add_node("research", research_agent)\ngraph.add_node("strategy", strategy_agent)\ngraph.add_edge("research", "strategy")\n```'],

    ]
  },
  en: {
    live: 'Connected', sbTitle: 'Sample missions', eyebrow: 'Interactive Console',
    ctitle: 'AetherSwarm v1', csub: '6-agent pipeline — 100% local, zero SaaS',
    briefLabel: 'Mission', btnRun: '▶ Run the Swarm', btnRunning: 'Agents running…',
    idleText: 'Select a mission or write your brief, then run the Swarm.',
    agents: ['Researcher','Strategist','Coder','Executor','Critic','Synthesizer'],
    agentEmoji: ['🔍','🧠','💻','⚡','🔬','✨'],
    missions: [
      {label:'Market analysis', title:'AI tool opportunities for solopreneurs', brief:'Analyze current trends in the AI tools market for solopreneurs and propose 3 high-potential product opportunities.'},
      {label:'Content strategy', title:'30-day X / LinkedIn content plan', brief:'Create a 30-day content plan for X and LinkedIn targeting solopreneurs who want to automate with AI.'},
      {label:'Product audit', title:'Optimize a B2B SaaS with 0 customers', brief:'Audit a B2B SaaS with no customers yet and propose a Go-To-Market action plan for the first 90 days.'},
      {label:'Competitor research', title:'No-code tools benchmark 2025', brief:'Compare the top 5 no-code tools in 2025 for building AI apps and identify the best one for a non-dev solopreneur.'},
    ],
    outputs: [
      ['🔍 Researcher', 'Data collection in progress…\n\nSources analyzed:\n• Google Trends: "AI tools for solopreneurs" +420% YoY\n• Product Hunt: 340 new AI tools in Q1 2025\n• Reddit r/solopreneur: 67k members, +12k in 3 months\n\nSignals identified:\n1. Strong demand for automating repetitive tasks\n2. Frustration with overpriced SaaS (>$50/month)\n3. Need for tools that run locally (privacy-first)'],
      ['🧠 Strategist', 'Strategic analysis complete\n\nOpportunities detected:\n\n① LOCAL AGENTS (high potential)\n   Gap: local + affordable + simple tools\n   Estimated TAM: 2.3M solopreneurs EU/NA\n   Target price: $29-49 one-time\n\n② SECTOR AI TEMPLATES (medium potential)\n   Gap: generic prompts vs. specific use cases\n   Model: $9-19 per vertical pack\n\n③ AUTOMATED AI AUDIT (high potential)\n   Gap: self-diagnosis without consultant\n   Target price: $79-149/report'],
      ['💻 Coder', 'MVP Prototype — Local Solopreneur Agent\n\n```python\nfrom langgraph.graph import StateGraph\nfrom langchain_community.llms import Ollama\n\nllm = Ollama(model="llama3.2:3b")\n\ndef research_agent(state):\n    """Collect market data"""\n    return {"data": llm.invoke(state["query"])}\n\ndef strategy_agent(state):\n    """Generate recommendations"""\n    prompt = f"Brief:{state[\'query\']}\\nData:{state[\'data\']}\\n→ Top 3 actions:"\n    return {"strategy": llm.invoke(prompt)}\n\ngraph = StateGraph(dict)\ngraph.add_node("research", research_agent)\ngraph.add_node("strategy", strategy_agent)\ngraph.add_edge("research", "strategy")\n```'],

      ['🔬 Critic', 'Critical review of the plan\n\n✅ Strengths:\n• Market validated by data\n• One-time vs SaaS model = competitive advantage\n• Mature tech stack (LangGraph + Ollama)\n\n⚠️ Watch out:\n• Local LLM quality < GPT-4 (gap to manage)\n• User onboarding needs simplification\n• Technical support = unanticipated load\n\n💡 Recommendation: add a 5-min video setup guide'],
      ['✨ Synthesizer', 'FINAL SYNTHESIS — AetherSwarm Analysis\n\nTOP 3 VALIDATED OPPORTUNITIES:\n\n1. 🥇 Local AI Agent Pack ($39 one-time)\n   Score: 94/100 · Effort: 3 weeks · ROI: high\n   → Differentiator: local + no subscription\n\n2. 🥈 Vertical Prompt Templates ($9-19)\n   Score: 82/100 · Effort: 1 week · ROI: medium\n   → Differentiator: sector specialization\n\n3. 🥉 Auto AI Audit Report ($99)\n   Score: 77/100 · Effort: 4 weeks · ROI: strong\n   → Differentiator: auto report without consultant\n\nRECOMMENDATION: Launch option 1 first — that\'s exactly what AetherSwarm does. 🎯'],
    ]

};

let lang = 'fr';
let running = false;
let selectedMission = null;

function t() { return T[lang]; }

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach((b,i) => b.classList.toggle('active', i===(l==='fr'?0:1)));
  render();
}

function render() {
  const d = t();
  document.getElementById('live-label').textContent = d.live;
  document.getElementById('sb-title').textContent = d.sbTitle;
  document.getElementById('eyebrow').textContent = d.eyebrow;
  document.getElementById('ctitle').textContent = d.ctitle;
  document.getElementById('csub').textContent = d.csub;
  document.getElementById('brief-label').textContent = d.briefLabel;
  document.getElementById('idle-text').textContent = d.idleText;
  document.querySelector('.btn-label').textContent = d.btnRun;
  document.querySelector('.running-label').textContent = d.btnRunning;
  document.getElementById('brief').placeholder = d.missions[0].brief.slice(0,60)+'…';

  // Pipeline
  const pipe = document.getElementById('pipeline');
  pipe.innerHTML = '';
  d.agents.forEach((name, i) => {
    const step = document.createElement('div');
    step.className = 'agent-step';
    step.id = 'agent-'+i;
    step.innerHTML = `<div class="agent-icon" id="icon-${i}">${d.agentEmoji[i]}</div><div class="agent-name">${name}</div>`;
    pipe.appendChild(step);
    if(i < d.agents.length-1) {
      const arr = document.createElement('div');
      arr.className = 'agent-arrow';
      pipe.appendChild(arr);
    }
  });

  // Missions
  const ms = document.getElementById('missions');
  ms.innerHTML = '';
  d.missions.forEach((m, i) => {
    const card = document.createElement('div');
    card.className = 'mission-card' + (selectedMission===i ? ' active' : '');
    card.innerHTML = `<div class="mission-label">${m.label}</div><div class="mission-title">${m.title}</div>`;
    card.onclick = () => selectMission(i);
    ms.appendChild(card);
  });
}

function selectMission(i) {
  selectedMission = i;
  document.getElementById('brief').value = t().missions[i].brief;
  render();
}

async function runSwarm() {
  if(running) return;
  const brief = document.getElementById('brief').value.trim();
  if(!brief) { document.getElementById('brief').focus(); return; }

  running = true;
  const btn = document.getElementById('run-btn');
  btn.classList.add('running');
  btn.disabled = true;

  const output = document.getElementById('output');
  output.innerHTML = '';

  const agents = t().agents;
  const outputs = t().outputs;

  for(let i=0; i<agents.length; i++) {
    // Activate agent icon
    document.querySelectorAll('.agent-icon').forEach((el,j) => {
      el.classList.remove('active','done');
      if(j<i) el.classList.add('done');
      if(j===i) el.classList.add('active');
    });

    await sleep(800);

    // Stream output
    const block = document.createElement('div');
    block.className = 'agent-output output-block';
    block.innerHTML = `<div class="agent-output-header">${outputs[i][0]}</div><div class="agent-output-body" id="out-${i}"></div>`;
    output.appendChild(block);
    output.scrollTop = output.scrollHeight;

    await typeText('out-'+i, outputs[i][1], 6);
    output.scrollTop = output.scrollHeight;
  }

  // All done
  document.querySelectorAll('.agent-icon').forEach(el => { el.classList.remove('active'); el.classList.add('done'); });

  running = false;
  btn.classList.remove('running');
  btn.disabled = false;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function typeText(id, text, speed=8) {
  const el = document.getElementById(id);
  for(let i=0; i<text.length; i++) {
    el.textContent += text[i];
    if(i%3===0) await sleep(speed);
  }
}

render();
</script>
</body>
</html>
