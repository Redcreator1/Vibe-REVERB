name = "reverb01"
main = "dist/worker.js"
compatibility_date = "2025-06-28"
compatibility_flags = ["nodejs_compat"]

# GEMINI_API_KEY doit être ajouté via : wrangler secret put GEMINI_API_KEY

# Durable Object pour le chat temps réel multi-opérateurs
[[durable_objects.bindings]]
name = "REVERB_CHAT"
class_name = "ReverbChatSQL"

# Durable Object pour la guerre de territoires (Sandbox multijoueur)
[[durable_objects.bindings]]
name = "REVERB_TERRITORIES"
class_name = "ReverbTerritories"

# Durable Object pour les comptes joueurs (callsign + code de récupération)
[[durable_objects.bindings]]
name = "REVERB_ACCOUNTS"
class_name = "ReverbAccounts"

[[migrations]]
tag = "v1"
new_classes = ["ReverbChat"]

[[migrations]]
tag = "v3"
new_sqlite_classes = ["ReverbTerritories"]

[[migrations]]
tag = "v4"
deleted_classes = ["ReverbChat"]
new_sqlite_classes = ["ReverbChatSQL"]

[[migrations]]
tag = "v5"
new_sqlite_classes = ["ReverbAccounts"]
