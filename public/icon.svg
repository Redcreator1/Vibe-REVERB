<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="38%" cy="30%" r="72%">
      <stop offset="0%" stop-color="#16172b"/>
      <stop offset="100%" stop-color="#07080f"/>
    </radialGradient>
    <filter id="gp" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gc" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="13" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="border-glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle ambient pink -->
  <ellipse cx="230" cy="215" rx="190" ry="160" fill="#ff2a74" opacity="0.04"/>

  <!-- R top half: P/D shape -->
  <path fill="#ff2a74" filter="url(#gp)"
    d="M 92 88 L 308 88 A 102 89 0 0 1 308 266 L 150 266 L 150 88 Z"/>

  <!-- R vertical bar -->
  <rect x="92" y="88" width="58" height="336" rx="7" fill="#ff2a74" filter="url(#gp)"/>

  <!-- R middle crossbar -->
  <rect x="150" y="266" width="160" height="56" rx="7" fill="#ff2a74" filter="url(#gp)"/>

  <!-- R diagonal leg (CYAN) -->
  <line x1="293" y1="266" x2="415" y2="424"
        stroke="#00f0ff" stroke-width="60" stroke-linecap="round" filter="url(#gc)"/>

  <!-- Border glow -->
  <rect width="512" height="512" rx="96" fill="none"
        stroke="#ff2a74" stroke-width="2.5" opacity="0.55" filter="url(#border-glow)"/>
</svg>
